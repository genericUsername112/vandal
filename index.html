<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANDAL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%; height: 100%;
background: #080808;
overflow: hidden;
}

.hero {
position: fixed;
inset: 0;
background-image: url(‘https://i.imgur.com/8l5ncEb.png’);
background-size: cover;
background-position: center top;
background-repeat: no-repeat;
opacity: 0;
animation: fadeInBg 1.8s ease forwards 0.2s;
}

.hero::after {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(
to bottom,
rgba(0,0,0,0.1) 0%,
rgba(0,0,0,0.0) 35%,
rgba(0,0,0,0.55) 70%,
rgba(0,0,0,0.95) 100%
);
}

.grain {
position: fixed;
inset: -50%;
width: 200%; height: 200%;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 512 512’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.75’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);
opacity: 0.04;
pointer-events: none;
z-index: 100;
animation: grainMove 0.12s steps(1) infinite;
}

@keyframes grainMove {
0%   { transform: translate(0,0); }
25%  { transform: translate(-3px,2px); }
50%  { transform: translate(2px,-3px); }
75%  { transform: translate(3px,2px); }
100% { transform: translate(-2px,3px); }
}

.ui {
position: fixed;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-end;
padding-bottom: clamp(44px, 9vh, 88px);
z-index: 10;
}

.logo-img {
width: clamp(280px, 58vw, 540px);
opacity: 0;
transform: translateY(22px);
animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) forwards 1.0s;
filter: drop-shadow(0 6px 32px rgba(0,0,0,0.9));
margin-bottom: clamp(28px, 5vh, 52px);
}

.cta {
display: inline-block;
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(16px, 3.5vw, 22px);
letter-spacing: 0.3em;
color: #0a0a0a;
background: #f0ead6;
padding: 16px 52px;
text-decoration: none;
position: relative;
opacity: 0;
transform: translateY(14px);
animation: riseIn 0.7s ease forwards 1.6s;
transition: background 0.2s ease, transform 0.15s ease;
}

.cta::before {
content: ‘’;
position: absolute;
inset: 0;
border: 2px solid #e8002a;
transform: translate(5px, 5px);
transition: transform 0.15s ease;
z-index: -1;
}

.cta:hover { background: #f5c400; transform: translate(-2px,-2px); }
.cta:hover::before { transform: translate(8px,8px); }

@keyframes fadeInBg {
from { opacity: 0; }
to   { opacity: 1; }
}

@keyframes riseIn {
from { opacity: 0; transform: translateY(22px); }
to   { opacity: 1; transform: translateY(0); }
}
</style>

</head>
